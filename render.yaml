services:
  - type: web
    name: deeply-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm ci && cd packages/database && npx prisma generate && cd ../.. && npm run build --workspace=packages/database && cd packages/database && npx prisma migrate deploy && npx prisma db seed && cd ../.. && npm run build --workspace=apps/api
    startCommand: node apps/api/dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REVENUECAT_WEBHOOK_SECRET
        sync: false
      - key: REVENUECAT_SECRET_KEY
        sync: false
